<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="900" height="220">
  <!-- ── Logo mark (left) ── -->

  <!-- Outer circle ring -->
  <circle cx="110" cy="108" r="90" fill="none" stroke="#EFE0BD" stroke-width="4"/>

  <!-- Bottom half (cream ground) -->
  <path d="M 20 108 A 90 90 0 0 0 200 108 Z" fill="#EFE0BD"/>

  <!-- Top half (orange sunset sky) -->
  <path d="M 20 108 A 90 90 0 0 1 200 108 Z" fill="#E07820"/>


  <!-- Ground hill -->
  <ellipse cx="110" cy="198" rx="80" ry="12" fill="#EFE0BD"/>

  <!-- Cactus (extends from ground up into orange sky) -->
  <g fill="#EFE0BD">
    <rect x="163" y="72" width="7" height="36" rx="2"/>
    <rect x="152" y="82" width="12" height="5" rx="2"/>
    <rect x="152" y="76" width="7" height="9" rx="2"/>
    <rect x="170" y="86" width="12" height="5" rx="2"/>
    <rect x="176" y="80" width="7" height="9" rx="2"/>
  </g>

  <!-- Camel body (humps in orange sky above equator) -->
  <path d="
    M 62 108 L 61 98 L 60 90 L 57 82
    L 62 88 L 68 92 L 75 94
    L 82 92 L 88 87 L 94 80
    L 98 73 L 102 66 L 107 61 L 112 60
    L 116 65 L 119 71 L 120 76
    L 122 70 L 126 64 L 131 62
    L 135 67 L 137 74 L 137 83 L 135 94 L 133 108
    L 127 108 L 126 100 L 122 108
    L 109 108 L 108 100 L 104 108
    L 78 108 L 77 100 L 73 108
    L 65 108 L 64 100 L 62 108
    Z
  " fill="#EFE0BD"/>

  <!-- Camel head and neck -->
  <path d="
    M 57 82 L 51 73 L 45 65 L 41 58
    L 40 53 L 43 49 L 48 48 L 53 49
    L 56 54 L 57 61 L 56 69 L 56 77 L 58 82
    Z
  " fill="#EFE0BD"/>

  <!-- Camel tail -->
  <path d="M 137 80 Q 147 72 143 62 Q 149 72 144 82 Z" fill="#EFE0BD"/>

  <!-- ── Text (right) ── -->

  <!-- CAMEL RANCH -->
  <text
    x="240" y="115"
    font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif"
    font-size="82" font-weight="900"
    fill="#EFE0BD"
    letter-spacing="4"
  >CAMEL RANCH</text>

  <!-- Left rule -->
  <rect x="240" y="135" width="72" height="2.5" fill="#E07820"/>
  <!-- Right rule -->
  <rect x="730" y="135" width="130" height="2.5" fill="#E07820"/>

  <!-- BOOKING -->
  <text
    x="240" y="160"
    font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif"
    font-size="46" font-weight="700"
    fill="#E07820"
    letter-spacing="22"
  >BOOKING</text>

  <!-- Tagline -->
  <text
    x="240" y="188"
    font-family="'Nunito', 'Segoe UI', Arial, sans-serif"
    font-size="11" font-weight="600"
    fill="#6B8AA8"
    letter-spacing="3.5"
  >DIY BOOKING WORKFLOW FOR BANDS</text>
</svg>
