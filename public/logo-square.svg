<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 420" width="400" height="420">
  <!-- Background -->
  <rect width="400" height="420" fill="#0D1B2A"/>

  <!-- Outer circle ring (cream) -->
  <circle cx="200" cy="155" r="108" fill="none" stroke="#EFE0BD" stroke-width="5"/>

  <!-- Bottom half circle fill (cream ground) -->
  <path d="M 92 155 A 108 108 0 0 0 308 155 Z" fill="#EFE0BD"/>

  <!-- Top half circle (orange sunset sky) -->
  <path d="M 92 155 A 108 108 0 0 1 308 155 Z" fill="#E07820"/>

  <!-- Stripes in orange sky, clipped to top half -->
  <clipPath id="topclip">
    <path d="M 92 155 A 108 108 0 0 1 308 155 Z"/>
  </clipPath>
  <g clip-path="url(#topclip)">
    <rect x="92" y="71" width="216" height="7" fill="#C05808"/>
    <rect x="92" y="84" width="216" height="7" fill="#C05808"/>
    <rect x="92" y="97" width="216" height="7" fill="#C05808"/>
    <rect x="92" y="110" width="216" height="7" fill="#C05808"/>
    <rect x="92" y="123" width="216" height="7" fill="#C05808"/>
    <rect x="92" y="136" width="216" height="7" fill="#C05808"/>
  </g>

  <!-- Ground hill -->
  <ellipse cx="200" cy="263" rx="95" ry="14" fill="#EFE0BD"/>

  <!-- Cactus (extends from ground up into orange sky) -->
  <g fill="#EFE0BD">
    <rect x="260" y="112" width="8" height="43" rx="3"/>
    <rect x="250" y="124" width="14" height="6" rx="3"/>
    <rect x="250" y="117" width="8" height="10" rx="3"/>
    <rect x="272" y="129" width="14" height="6" rx="3"/>
    <rect x="279" y="121" width="8" height="11" rx="3"/>
  </g>

  <!-- Camel body (humps in orange sky above equator y=155) -->
  <path d="
    M 142 155 L 141 143 L 140 133 L 136 124
    L 142 132 L 150 137 L 158 140
    L 166 137 L 174 130 L 181 121
    L 186 112 L 190 103 L 196 97 L 202 96
    L 207 102 L 211 110 L 212 117
    L 214 110 L 219 103 L 225 101
    L 230 107 L 232 116 L 232 126 L 230 137 L 228 155
    L 220 155 L 219 145 L 214 155
    L 199 155 L 198 145 L 193 155
    L 162 155 L 161 145 L 156 155
    L 146 155 L 145 145 L 142 155
    Z
  " fill="#EFE0BD"/>

  <!-- Camel head and neck -->
  <path d="
    M 136 124 L 130 114 L 123 103 L 118 93 L 117 87
    L 120 82 L 126 80 L 131 82
    L 134 88 L 135 95 L 134 109 L 135 118 L 138 124
    Z
  " fill="#EFE0BD"/>

  <!-- Camel tail -->
  <path d="M 232 121 Q 244 112 240 100 Q 247 112 241 124 Z" fill="#EFE0BD"/>

  <!-- CAMEL RANCH -->
  <text
    x="200" y="313"
    font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif"
    font-size="52" font-weight="900"
    fill="#EFE0BD"
    text-anchor="middle"
    letter-spacing="5"
  >CAMEL RANCH</text>

  <!-- Left rule -->
  <rect x="48"  y="328" width="68" height="2" fill="#E07820"/>
  <!-- Right rule -->
  <rect x="284" y="328" width="68" height="2" fill="#E07820"/>

  <!-- BOOKING -->
  <text
    x="200" y="342"
    font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif"
    font-size="30" font-weight="700"
    fill="#E07820"
    text-anchor="middle"
    letter-spacing="14"
  >BOOKING</text>

  <!-- Tagline -->
  <text
    x="200" y="370"
    font-family="'Nunito', 'Segoe UI', Arial, sans-serif"
    font-size="10.5" font-weight="600"
    fill="#6B8AA8"
    text-anchor="middle"
    letter-spacing="3.5"
  >DIY BOOKING WORKFLOW FOR BANDS</text>
</svg>
